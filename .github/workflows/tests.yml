name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Windows x86
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -A Win32 -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Print diagnostic logs
        if: failure()
        shell: pwsh
        run: |
          Get-ChildItem build -Recurse -Filter *.log | ForEach-Object {
            Write-Host "::group::$($_.FullName)"
            Get-Content $_.FullName
            Write-Host "::endgroup::"
          }
